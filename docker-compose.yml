services:
  postgres:
    image: postgres:17
    container_name: nutrition-tracker-postgres

    environment:
      POSTGRES_DB: nutrition_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: nutrition-tracker-pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nutritiontracker.com
      PGADMIN_DEFAULT_PASSWORD: admin

    ports:
      - "5050:80"

    depends_on:
      - postgres

    restart: unless-stopped

volumes:
  postgres_data:
